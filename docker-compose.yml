services:
  tavily-router:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
    ports:
      - "8082:8082"
    volumes:
      - ./config.json:/config.json:ro
      - router-state:/state
    environment:
      - TAVILY_CONFIG=/config.json
      - TAVILY_STATE_FILE=/state/state.json
    networks:
      - routers
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

networks:
  routers:
    name: smart-routers
    external: true

volumes:
  router-state: